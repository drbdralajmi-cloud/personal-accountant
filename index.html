<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="description" content="المحاسب الشخصي — تطبيق متابعة مالية بسيط وسهل" />
  <title>المحاسب الشخصي</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💸</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- الرأس -->
    <header class="app-header">
      <div class="brand">
        <span class="brand-logo">💸</span>
        <div>
          <h1 class="brand-name" data-i18n="appName">المحاسب الشخصي</h1>
          <p class="brand-tagline" data-i18n="appTagline">تتبّع أموالك ببساطة</p>
        </div>
      </div>
      <button id="theme-toggle" class="icon-btn" title="المظهر" aria-label="theme">🌙</button>
    </header>

    <!-- محتوى الصفحات -->
    <main id="view" class="view"></main>

    <!-- زر الإضافة العائم -->
    <button id="fab" class="fab" aria-label="add">＋</button>

    <!-- شريط التنقل السفلي -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-route="dashboard">
        <span class="nav-icon">🏠</span><span class="nav-label" data-i18n="nav_dashboard">الرئيسية</span>
      </button>
      <button class="nav-btn" data-route="transactions">
        <span class="nav-icon">📋</span><span class="nav-label" data-i18n="nav_transactions">العمليات</span>
      </button>
      <button class="nav-btn" data-route="budget">
        <span class="nav-icon">🎯</span><span class="nav-label" data-i18n="nav_budget">الميزانية</span>
      </button>
      <button class="nav-btn" data-route="reports">
        <span class="nav-icon">📊</span><span class="nav-label" data-i18n="nav_reports">التقارير</span>
      </button>
      <button class="nav-btn" data-route="settings">
        <span class="nav-icon">⚙️</span><span class="nav-label" data-i18n="nav_settings">الإعدادات</span>
      </button>
    </nav>
  </div>

  <!-- نافذة منبثقة (Modal) -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal" role="dialog" aria-modal="true"></div>
  </div>

  <!-- إشعار سريع (Toast) -->
  <div id="toast" class="toast hidden"></div>

  <script src="vendor/chart.umd.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
